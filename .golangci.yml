# golangci-lint configuration — follows grid-platform standards
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  tests: true

linters:
  enable:
    # Bugs & correctness
    - govet
    - staticcheck
    - gosimple
    - gosec
    - bodyclose
    - sqlclosecheck
    - rowserrcheck
    - nilerr
    - noctx
    - copyloopvar

    # Error handling
    - errcheck
    - errorlint
    - errname
    - wrapcheck

    # Complexity
    - gocyclo
    - gocognit
    - funlen
    - nestif

    # Duplication
    - dupl

    # Style & formatting
    - gofmt
    - goimports
    - revive
    - stylecheck
    - unconvert
    - unparam
    - misspell
    - godot
    - exhaustive

    # Performance
    - prealloc
    - gocritic

    # Dead code & unused
    - unused
    - ineffassign

    # Testing
    - tparallel

linters-settings:
  gocyclo:
    min-complexity: 15

  gocognit:
    min-complexity: 15

  funlen:
    lines: 80
    statements: 50

  nestif:
    min-complexity: 4

  dupl:
    threshold: 100

  exhaustive:
    default-signifies-exhaustive: true

  gosec:
    severity: medium
    confidence: medium

  errcheck:
    check-type-assertions: true
    check-blank: false

  errorlint:
    errorf: true
    asserts: true
    comparison: true

  wrapcheck:
    ignoreSigs:
      - .Errorf(
      - errors.New(
      - errors.Unwrap(
      - .Wrap(
      - .Wrapf(
      - .WithMessage(
      - .WithStack(

  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - hugeParam
      - ifElseChain

  misspell:
    locale: US

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    # Test files — relax complexity, length, duplication, and error checks
    - path: _test\.go
      linters:
        - funlen
        - gocyclo
        - gocognit
        - errcheck
        - dupl
        - unparam

    # Allow fmt.Print in main
    - path: cmd/
      linters:
        - forbidigo

    # Allow dot imports in tests for testify
    - path: _test\.go
      text: "dot-imports"

    # File paths from environment/config are expected
    - linters:
        - gosec
      text: "G304"

    # wrapcheck and complexity checks are too strict for cobra commands
    - path: cmd/
      linters:
        - wrapcheck
        - gocognit
        - gocyclo

    # Index and hook parsing — complexity is inherent to JSONL state machines
    - path: internal/(index|hook)/
      linters:
        - gocognit
        - nestif

    # Main is long by nature (command registration)
    - path: cmd/.*/main\.go
      linters:
        - funlen
